<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open Tiny Leaders Web</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: #fff7ed; color: #1f2937; }
      main { width: min(520px, calc(100% - 32px)); text-align: center; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 20px; }
      a { color: #0f766e; font-weight: 700; }
      .button { display: inline-block; border: 1px solid #0f766e; border-radius: 6px; padding: 12px 16px; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <h1>Open Tiny Leaders Web</h1>
      <p>For the real web address, open <strong>OPEN_WEB.cmd</strong> in this folder, then use <a href="http://127.0.0.1:3000/">http://127.0.0.1:3000/</a>.</p>
      <div class="actions">
        <a class="button" href="http://127.0.0.1:3000/">Open web address</a>
        <a class="button" href="out/index.html">Open file version</a>
      </div>
    </main>
  </body>
</html>
